<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Connexion</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b, #312e81);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            width: 400px;
            padding: 35px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(15px);
            color: white;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 26px;
        }

        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-size: 14px;
            color: #c7d2fe;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 14px;
        }

        input::placeholder {
            color: #94a3b8;
        }

        input:focus {
            border: 1px solid #6366f1;
        }

        button {
            width: 100%;
            margin-top: 25px;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99,102,241,0.4);
        }

        .msg {
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 14px;
            text-align: center;
        }

        .success {
            background: rgba(34,197,94,0.2);
            color: #86efac;
        }

        .error {
            background: rgba(239,68,68,0.2);
            color: #fca5a5;
        }

        .footer {
            text-align: center;
            margin-top: 18px;
            font-size: 13px;
            color: #94a3b8;
        }
    </style>
</head>

<body>

<div class="login-card">

    <h2>Connexion</h2>

    <!-- Message succès logout -->
    <p th:if="${param.logout}" class="msg success">
        Déconnexion réussie
    </p>

    <!-- Message erreur login -->
    <p th:if="${param.error}" class="msg error">
        Nom d'utilisateur ou mot de passe incorrect
    </p>

    <!-- Formulaire compatible Spring Security -->
    <form th:action="@{/login}" method="post">

        <label for="username">Nom d'utilisateur</label>
        <input id="username" type="text" name="username" placeholder="Entrer votre nom">

        <label for="password">Mot de passe</label>
        <input id="password" type="password" name="password" placeholder="Entrer votre mot de passe">

        <button type="submit">Se connecter</button>
    </form>

    <div class="footer">
        Application sécurisée avec Spring Security
    </div>

</div>

</body>
</html>
