<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Espace utilisateur</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b, #0f766e);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .dashboard {
            width: 720px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(15px);
            color: white;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .role {
            background: rgba(59,130,246,0.2);
            color: #93c5fd;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
        }

        h2 {
            font-size: 26px;
        }

        .content {
            margin-top: 10px;
            line-height: 1.6;
            color: #cbd5f5;
        }

        .username {
            color: #67e8f9;
            font-weight: bold;
        }

        .actions {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s;
        }

        .home-btn {
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            color: white;
        }

        .logout-btn {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
    </style>
</head>

<body>

<div class="dashboard">

    <div class="header">
        <h2>Espace Utilisateur</h2>
        <span class="role">USER / ADMIN</span>
    </div>

    <div class="content">
        <p>Bienvenue <span class="username" th:text="${username}"></span></p>
        <p>Cette section est accessible aux utilisateurs ayant les rôles USER ou ADMIN.</p>
    </div>

    <div class="actions">
        <a th:href="@{/}" class="btn home-btn">Accueil</a>

        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn logout-btn">Se déconnecter</button>
        </form>
    </div>

</div>

</body>
</html>
