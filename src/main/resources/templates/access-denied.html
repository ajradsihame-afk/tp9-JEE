<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Accès refusé</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 40px;
            width: 420px;
            text-align: center;
            color: white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        h2 {
            font-size: 26px;
            margin-bottom: 10px;
            color: #f87171;
        }

        p {
            font-size: 15px;
            color: #cbd5f5;
            margin-bottom: 25px;
        }

        a {
            text-decoration: none;
            padding: 12px 22px;
            border-radius: 12px;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: white;
            font-weight: 600;
            transition: 0.3s;
        }

        a:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(99,102,241,0.5);
        }
    </style>
</head>

<body>

<div class="card">
    <div class="icon">⛔</div>

    <h2>Accès refusé</h2>

    <p>
        Vous n’avez pas les droits nécessaires pour consulter cette page.
        Contactez un administrateur si le problème persiste.
    </p>

    <!-- Compatible avec ton controller -->
    <a th:href="@{/}">Retour à l’accueil</a>
</div>

</body>
</html>
